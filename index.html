<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cynthia Yang | Home</title>
    <style>
        /* 基本樣式 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 飄移動畫 */
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .container {
            display: flex;
            align-items: center;
            gap: 60px;
            max-width: 1000px;
            animation: slideUp 1.2s ease-out forwards;
        }

        /* 左側大頭照 */
        .profile-pic {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(100%); /* 圖一的黑白風格 */
        }

        /* 右側文字內容 */
        .intro-section {
            max-width: 450px;
        }

        h1 { font-size: 80px; margin: 0; font-weight: bold; }
        h2 { font-size: 24px; margin: 10px 0; }
        p { line-height: 1.6; color: #333; margin-bottom: 40px; }

        /* 按鈕組 */
        .button-group {
            display: flex;
            gap: 20px;
        }

        .btn-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .btn-circle:hover { transform: scale(1.1); }
        .yellow { background-color: #f1b211; }
        .red { background-color: #ff5031; }
        .cyan { background-color: #85d8d0; }
    </style>
</head>
<body>

    <div class="container">
        <img src="profile.jpg" alt="Cynthia Yang" class="profile-pic">

        <div class="intro-section">
            <h1>Hello</h1>
            <h2>A Bit About Me</h2>
            <p>我是 Cynthia，目前在 SHOPLINE 擔任法務營運助理。我專注於法律爭議解決、流程優化以及合規管理，致力於在法律專業與企業運作間建立高效的橋樑。</p>
            
            <div class="button-group">
                <a href="resume.html" class="btn-circle yellow">Resume</a>
                <a href="projects.html" class="btn-circle red">Projects</a>
                <a href="contact.html" class="btn-circle cyan">Contact</a>
            </div>
        </div>
    </div>

</body>
</html>
