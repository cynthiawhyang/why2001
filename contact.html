<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Cynthia Yang</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background-color: #fcfafc; /* 莫內淡紫色背景 */
        }

        @keyframes slideUpFade { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .contact-card { 
            text-align: center; 
            background: white; 
            padding: 60px; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.03); 
            animation: slideUpFade 1s ease-out; 
            max-width: 450px; 
            width: 90%; 
        }

        h1 { 
            font-size: 32px; 
            margin-bottom: 40px; 
            color: #444; 
            border-bottom: 3px solid #FFD1DC; /* 粉色底線 */
            display: inline-block; 
            padding-bottom: 5px; 
        }

        /* 聯絡資訊列：確保圖標與文字垂直置中，且水平居中 */
        .contact-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px; /* 圖標與文字的間距 */
            margin: 25px 0; /* 每行之間的固定等距 */
            font-size: 18px;
            color: #666;
        }

        .contact-row a {
            color: #666;
            text-decoration: none;
            transition: 0.3s;
        }

        .contact-row a:hover {
            color: #000;
            border-bottom: 1px solid #B0E0E6;
        }

        /* 圖標尺寸統一 */
        .icon {
            width: 24px;
            height: 24px;
            opacity: 0.7;
        }

        .linkedin-text {
            color: #0077b5 !important;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <h1>Contact</h1>

        <div class="contact-row">
            <img src="https://cdn-icons-png.flaticon.com/512/455/455705.png" alt="Phone" class="icon">
            <span>0921003560</span>
        </div>

        <div class="contact-row">
            <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Email" class="icon">
            <a href="mailto:cynthiawhyang@gmail.com">cynthiawhyang@gmail.com</a>
        </div>

        <div class="contact-row">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn" class="icon">
            <a href="https://www.linkedin.com/in/cynthia-yang-why20011108/" target="_blank" class="linkedin-text">
                View My LinkedIn Profile
            </a>
        </div>
    </div>

</body>
</html>
