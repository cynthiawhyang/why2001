<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Cynthia Yang</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background-color: #fcfafc; 
        }

        @keyframes slideUpFade { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .contact-card { 
            text-align: center; 
            background: white; 
            padding: 60px; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.03); 
            animation: slideUpFade 1s ease-out; 
            width: 400px; 
        }

        /* 🚀 調整重點：調降標題邊距 */
        h1 { 
            font-size: 32px; 
            margin-top: 0;
            margin-bottom: 15px; /* 從 40px 調降，讓標題與第一項目的總間距等於 30px */
            color: #444; 
            border-bottom: 3px solid #FFD1DC; 
            display: inline-block; 
            padding-bottom: 5px; 
        }

        /* 🚀 調整重點：統一每行間距 */
        .contact-row { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            margin: 15px 0; /* 15px 上邊距 + 15px 下邊距 = 30px 總項目間距 */
            font-size: 18px; 
            color: #666; 
        }

        .contact-row a { color: #666; text-decoration: none; border-bottom: 1px solid transparent; transition: 0.3s; }
        .contact-row a:hover { border-bottom: 1px solid #B0E0E6; color: #000; }
        
        .icon { width: 24px; height: 24px; opacity: 0.9; }
        .linkedin-text { color: #0077b5 !important; font-weight: 500; }
    </style>
</head>
<body>

    <div class="contact-card">
        <h1>Contact</h1>

        <div class="contact-row">
            <img src="https://cdn-icons-png.flaticon.com/512/455/455705.png" alt="Phone" class="icon">
            <span>0921003560</span>
        </div>

        <div class="contact-row">
            <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Email" class="icon">
            <a href="mailto:cynthiawhyang@gmail.com">cynthiawhyang@gmail.com</a>
        </div>

        <div class="contact-row">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn" class="icon">
            <a href="https://www.linkedin.com/in/cynthia-yang-why20011108/" target="_blank" class="linkedin-text">
                View My LinkedIn Profile
            </a>
        </div>
    </div>

</body>
</html>
